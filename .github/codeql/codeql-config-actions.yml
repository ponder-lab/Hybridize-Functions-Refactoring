# CodeQL configuration for the `actions` language analysis.
#
# The matrix workflow runs CodeQL once per language and selects the config
# file by interpolating `${{ matrix.language }}`. This file is for `actions`;
# `codeql-config-java-kotlin.yml` is the sibling for `java-kotlin`.
#
# 1. Drops the `security-and-quality` query suite (kept only `security-extended`).
#    Running both suites on the `actions` language can push past CodeQL's
#    5000-result-per-analysis storage limit, with the overflow silently
#    dropped. `security-and-quality` adds code-quality lint queries on top of
#    `security-extended`'s already-broad security set; the marginal signal on
#    YAML workflows is mostly noise. Keeping just `security-extended` brings
#    the result count under the cap while preserving every security-relevant
#    query. (The `java-kotlin` config still runs both suites — only `actions`
#    was hitting the cap. Same per-language split as ponder-lab/ML#231.)
#
# 2. Disables the `actions/unpinned-tag` rule (which flags `uses: foo/bar@v6`-style
#    tag references on non-GitHub-owned actions, asking for a SHA pin). For this
#    repo the rule fires as a build-reproducibility concern more than a
#    supply-chain-attack concern, and version-tag pinning is an acceptable
#    trade-off — mirrors the parallel change at ponder-lab/ML#231.
#    Re-enable by removing the `actions/unpinned-tag` exclusion below.

name: "ponder-lab/Hybridize-Functions-Refactoring CodeQL config (actions)"

queries:
  - uses: security-extended

query-filters:
  - exclude:
      id: actions/unpinned-tag
