# CodeQL configuration for the `java-kotlin` language analysis.
#
# The matrix workflow runs CodeQL once per language and selects the config
# file by interpolating `${{ matrix.language }}`. This file is for
# `java-kotlin`; `codeql-config-actions.yml` is the sibling for `actions`.
#
# Runs both `security-extended` and `security-and-quality` query suites —
# the same coverage that was in place before the per-language config split.
# `java-kotlin` doesn't hit CodeQL's 5000-result-per-analysis cap (only
# `actions` did), so this file keeps the broader coverage. The
# `actions/unpinned-tag` rule isn't applicable to Java code, so no rule
# exclusion is needed here either. Mirrors the parallel change at
# ponder-lab/ML#231.
#
# `paths-ignore` excludes the `Formatting/` Git submodule (Eclipse formatter
# config files; no Java code, so no findings expected — but explicit
# exclusion is more auditable than relying on no-Java-code-no-findings).
# **When adding or removing a submodule, update this list to match
# `.gitmodules` — there is no automatic discovery.**

name: "ponder-lab/Hybridize-Functions-Refactoring CodeQL config (java-kotlin)"

paths-ignore:
  - 'Formatting/**'

queries:
  - uses: security-extended
  - uses: security-and-quality
