name: CodeQL

# Triggers `pull_request` for PR checks, `push` to main for baseline analysis,
# `merge_group` so PRs in the merge queue have their pre-merge runs reported,
# and `schedule` for the weekly baseline that GitHub default-setup used to do.
#
# Mirror of `ponder-lab/ML/.github/workflows/codeql.yml` (which fixed the
# merge-queue + default-setup deadlock for that repo). Build sequence below
# follows `maven.yml`'s `Install with Maven` step minus tests and Tycho/PyDev
# (PyDev is only needed for the test phase).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  Analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language: [actions, java-kotlin]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - if: matrix.language == 'java-kotlin'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - if: matrix.language == 'java-kotlin'
        run: pip3.10 install -r requirements.txt

      # Auto-discover submodules and append them to the `java-kotlin` CodeQL
      # config's `paths-ignore`. Avoids hardcoding submodule paths in the
      # config file: if a new submodule is added (or an existing one removed),
      # the exclusion list updates without a separate CodeQL config edit.
      # Submodules are third-party code outside this codebase under change.
      # Applies to `java-kotlin` only — the `actions` analysis runs on YAML
      # workflows under `.github/workflows/`, which doesn't intersect with
      # submodule layouts. Mirrors the parallel change at ponder-lab/ML#232.
      - if: matrix.language == 'java-kotlin'
        name: Append submodule paths to CodeQL paths-ignore
        shell: bash
        run: |
          submodule_paths=$(git config --file .gitmodules --get-regexp path 2>/dev/null | awk '{print $2}')
          if [[ -n "$submodule_paths" ]]; then
            {
              printf '\n# Auto-appended by .github/workflows/codeql.yml from .gitmodules at scan time.\n'
              printf 'paths-ignore:\n'
              while IFS= read -r p; do
                printf "  - '%s/**'\n" "$p"
              done <<< "$submodule_paths"
            } >> .github/codeql/codeql-config-java-kotlin.yml
            echo "Appended paths-ignore for submodules:"
            echo "$submodule_paths"
          else
            echo "No submodules found; CodeQL config unchanged."
          fi

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config-${{ matrix.language }}.yml

      - if: matrix.language == 'java-kotlin'
        name: Install with Maven
        run: |
          ./mvnw -U \
            -s .travis.settings.xml \
            -Dgithub.username=${{ github.actor }} \
            -Dgithub.password=${{ secrets.GITHUB_TOKEN }} \
            -Dlogging.config.file=\${maven.multiModuleProjectDirectory}/logging.ci.properties \
            -DtrimStackTrace=true \
            -Dtycho.showEclipseLog=false \
            install -B -q -DskipTests=true

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
