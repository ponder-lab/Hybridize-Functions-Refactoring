# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Java CI with Maven
on:
  push:
    # GitHub Merge Queue creates branches under `refs/heads/gh-readonly-queue/...` and pushes
    # the queue's test commit there. That push fires this workflow's `push:` trigger AS WELL
    # AS the `merge_group:` trigger — two runs in the same concurrency group, where the second
    # cancels the first. The cancelled run is reported as failed to the merge queue, which
    # kicks the PR out. Filtering out those branches from `push:` lets `merge_group:` be the
    # sole trigger for queue-branch pushes.
    branches-ignore:
      - 'gh-readonly-queue/**'
  pull_request:
  merge_group:
  schedule:
  - cron: "0 2 * * 5"
concurrency:
  # Group includes the workflow name so merge_group runs from different workflows don't collide.
  # Cancel-in-progress is allowed for `pull_request` (new push to PR supersedes prior runs) and
  # for non-tag `push` events (commits to a branch supersede prior runs); explicitly NOT for
  # `merge_group` events, because GitHub Merge Queue spawns concurrent runs on the queue branch
  # and cancellation marks the cancelled run as failed, kicking the PR out of the queue. Same
  # fix as ponder-lab/ML#217.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')) }}
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Fail on whitespace errors
      run: git show HEAD --check
    - name: Run Spotless
      run: ./mvnw -s .travis.settings.xml -Dgithub.username=${{ github.actor }} -Dgithub.password=${{ secrets.GITHUB_TOKEN }} spotless:check -B
    - name: Cache Pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install global requirements
      run: pip3.10 install -r requirements.txt
    - name: Run Black
      run: black --fast --check --extend-exclude \/out .
    - name: Install test requirements
      run: pip3.10 install -r edu.cuny.hunter.hybridize.tests/requirements.txt
    - name: Install with Maven
      run: ./mvnw -U -s .travis.settings.xml -Dgithub.username=${{ github.actor }} -Dgithub.password=${{ secrets.GITHUB_TOKEN }} -Dlogging.config.file=\${maven.multiModuleProjectDirectory}/logging.ci.properties -DtrimStackTrace=true -Dtycho.showEclipseLog=false install -B -q -DskipTests=true
    - name: Print Python 3 version.
      run: python3 --version
    - name: Print Python 3.10 version.
      run: python3.10 --version
    - name: Clone our fork of PyDev
      run: |
        mkdir "$HOME/git"
        pushd "$HOME/git"
        git clone --depth=50 --branch=pydev_9_3 https://github.com/ponder-lab/Pydev.git
        popd
    - name: Test with Maven
      run: ./mvnw -U -s .travis.settings.xml -Dgithub.username=${{ github.actor }} -Dgithub.password=${{ secrets.GITHUB_TOKEN }} -Dlogging.config.file=\${maven.multiModuleProjectDirectory}/logging.ci.properties -DtrimStackTrace=true -Dtycho.showEclipseLog=false -B verify -Pjacoco coveralls:report
    - name: Coveralls GitHub Action
      uses: coverallsapp/github-action@v2.3.6
