# Dependabot configuration. See:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Approach: dependabot opens grouped PRs that a human reviews and merges
# (typically via the merge queue + `gh pr merge --auto`). We *do not* run
# auto-approve/auto-merge GitHub Actions workflows — those have a track
# record of silently no-op'ing in this repo (broken `if:` guards, missing
# `pull_request_target` triggers) and reviewing dependabot PRs takes
# seconds when grouping reduces the volume.
#
# Patch-version churn (e.g. `3.5.0 → 3.5.1`) is suppressed via per-block
# `ignore` rules on `version-update:semver-patch` for ecosystems where
# the patch cadence outpaces real review value. CVE-driven patches still
# arrive: dependabot's security-update path bypasses `version-update:*`
# ignore rules, so a vulnerability disclosed against a pinned patch level
# still opens a PR under the security-update workflow even though routine
# version-update patches do not.

version: 2
updates:
  # Maven build-plugin and library bumps. Grouped so a typical week opens
  # ONE plugin PR instead of one per plugin. Major bumps are excluded from
  # the group (they need individual review for breaking changes); patches
  # are excluded from version-updates entirely (see top-of-file note).
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      maven-plugins:
        applies-to: version-updates
        patterns:
          - "org.apache.maven.plugins:*"
          - "org.codehaus.mojo:*"
          - "com.diffplug.spotless:*"
          - "com.puppycrawl.tools:*"
          - "org.jacoco:*"
        update-types:
          - "minor"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  # Python tooling for the test/format requirements. `patterns:` lists the
  # tooling deps actually present in `/requirements.txt` today; extend it
  # when adding new tooling. Keeping the list tight (instead of
  # anticipatory globs like `pytest*`) prevents accidental capture of
  # test-fixture runtime deps if a future `directories:` expansion ever
  # broadens what the pip updater sees — `pytest*` would match the
  # `pytest` line in a fixture's `requirements.txt`, for instance.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      python-tooling:
        applies-to: version-updates
        patterns:
          - "black"
        update-types:
          - "minor"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
      # TensorFlow is pinned to 2.9.3 by the test fixtures and would force
      # a much larger refactor across the analyzer than dependabot can
      # safely propose. Drop the ignore once the test corpus migrates.
      - dependency-name: "tensorflow"

  # Test scaffolding pip manifests:
  # - `edu.cuny.hunter.hybridize.tests/requirements.txt` (CI install set)
  # - `edu.cuny.hunter.hybridize.tests/resources/HybridizeFunction/*/in/requirements.txt`
  #   (per-fixture pins so the analyzer resolves the same TF surface the
  #   test was authored against)
  #
  # The pin is intentional: the refactoring plug-in does not import or
  # execute these libraries at runtime — they are inputs to Ariadne's
  # static analysis, and the static call graphs depend on the exact
  # 2.9.3 API surface. We want NO dependabot PRs (version-update OR
  # security-update) against these manifests:
  #   - `open-pull-requests-limit: 0` suppresses version-update PRs.
  #   - `ignore: dependency-name: "*"` suppresses security-update PRs
  #     (per github docs, ignore conditions also block security-update
  #     PR creation when no `update-types` filter is set).
  #
  # Without this block, security-update PRs were being opened against
  # individual fixture manifests (#459 was the first such PR) because
  # dependabot security updates auto-discover ALL manifests in the repo,
  # but ignore rules from other blocks only apply to their declared
  # `directory:`. Existing security alerts on these manifests are
  # bulk-dismissed with reason `not_used`; this config prevents new
  # ones from spawning PRs.
  - package-ecosystem: "pip"
    directories:
      - "/edu.cuny.hunter.hybridize.tests"
      - "/edu.cuny.hunter.hybridize.tests/resources/HybridizeFunction/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "*"

  # GitHub Actions versions in `.github/workflows/*.yml`. These are
  # security-relevant (action supply-chain) and shift slowly; check
  # weekly, no grouping (each action is independent).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
