repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        args: ["--fast", "--extend-exclude", "/out"]
  - repo: local
    hooks:
      - id: spotless-apply
        name: Spotless Apply
        entry: ./mvnw spotless:apply
        language: system
        pass_filenames: false
